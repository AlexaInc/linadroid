# =====================================================================
# LinaDroid OS - LXC Container Configuration for Android Subsystem
# This config allows Android to boot on the shared kernel, using the
# host's physical GPU, Input, and Sound cards without extra layers.
# =====================================================================

# --- Container Identity & Architecture ---
lxc.uts.name = linadroid-runtime
lxc.arch = x86_64

# --- Boot Configuration ---
# Use the custom Android init system inside the container
lxc.init.path = /init
lxc.init.cmd = --second-stage

# --- Directory & Mount Points ---
# The rootfs for Android is located at /var/lib/lxc/linadroid-runtime/rootfs
lxc.rootfs.path = dir:/var/lib/lxc/linadroid-runtime/rootfs

# Keep standard mounts for Android
lxc.mount.auto = proc:mixed sys:mixed

# --- Secure System Configs (Required for Android) ---
lxc.cap.keep = sys_admin sys_nice sys_resource sys_time net_admin net_raw ipc_lock dac_override dac_read_search chown fowner fsetid setgid setuid mknod

# --- Networking ---
# Let the Android container share the host network stack (best performance, no NAT translation lag)
lxc.net.0.type = none

# --- Hardware Device Passthroughs ---
# We grant direct hardware access so SurfaceFlinger and HALs can communicate with hardware.

# Allow all block and character devices (can be restricted in production)
lxc.cgroup2.devices.allow = a

# 1. Bind Android IPC drivers (Binderfs / Binder)
lxc.mount.entry = /dev/binderfs/binder dev/binder none bind,create=file 0 0
lxc.mount.entry = /dev/binderfs/hwbinder dev/hwbinder none bind,create=file 0 0
lxc.mount.entry = /dev/binderfs/vndbinder dev/vndbinder none bind,create=file 0 0
lxc.mount.entry = /dev/ashmem dev/ashmem none bind,create=file 0 0

# 2. Graphics Card Passthrough (Direct GPU access for SurfaceFlinger)
lxc.mount.entry = /dev/dri dev/dri none bind,create=dir 0 0
lxc.mount.entry = /dev/fb0 dev/fb0 none bind,create=file 0 0

# 3. Input Devices (Keyboard, Mouse, Touchscreen)
lxc.mount.entry = /dev/input dev/input none bind,create=dir 0 0

# 4. Audio Card Passthrough (Direct ALSA/TinyALSA access)
lxc.mount.entry = /dev/snd dev/snd none bind,create=dir 0 0

# 5. Shared Host Directories
# Share a storage folder between the host Debian system and Android
# This makes file exchange extremely easy
lxc.mount.entry = /var/shared/linadroid mnt/shared none bind,create=dir 0 0

# --- Advanced LXC Settings ---
lxc.autodev = 1
lxc.tty.max = 0
lxc.console.path = none
lxc.selinux.context = unconfined
